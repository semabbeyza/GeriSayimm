<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecem ❤️ Enes Geri Sayım</title>
  <style>
    :root {
      --accent: #ff4d8d;
      --accent-2: #ff9ecb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #1f1020, #4b1d3f, #7a2f63);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("image.jpeg") no-repeat center center;
      background-size: cover;
      filter: brightness(0.5);
      z-index: -2;
    }

    .heart {
      position: absolute;
      bottom: -20px;
      font-size: 20px;
      animation: float 6s linear infinite;
      color: #ff6fa5;
      pointer-events: none;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
    }

    .container {
      text-align: center;
      background: rgba(0,0,0,0.38);
      padding: 30px 24px;
      border-radius: 24px;
      backdrop-filter: blur(10px);
      width: min(92vw, 420px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    h1 {
      margin: 0;
      font-size: 32px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 16px;
      opacity: 0.95;
    }

    .date {
      margin-top: 10px;
      font-weight: bold;
      color: var(--accent-2);
      font-size: 15px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 22px;
    }

    .box {
      background: rgba(255,255,255,0.16);
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .value {
      font-size: 30px;
      font-weight: bold;
    }

    .label {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .done {
      display: none;
      margin-top: 18px;
      font-size: 18px;
      font-weight: bold;
      color: #ffd9ea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ecem ❤️ Enes</h1>
    <div class="subtitle">En güzel güne geri sayım 💍</div>
    <div class="date">24 Ağustos 2026 • 19:00</div>

    <div class="countdown">
      <div class="box"><div class="value" id="days">0</div><div class="label">Gün</div></div>
      <div class="box"><div class="value" id="hours">0</div><div class="label">Saat</div></div>
      <div class="box"><div class="value" id="minutes">0</div><div class="label">Dakika</div></div>
      <div class="box"><div class="value" id="seconds">0</div><div class="label">Saniye</div></div>
    </div>

    <div class="done" id="done">Bugün o gün! Mutluluklar 💖</div>
  </div>

  <script>
    const weddingDate = new Date("2026-08-24T19:00:00");

    function updateCountdown() {
      const now = new Date();
      const diff = weddingDate - now;

      if (diff <= 0) {
        document.getElementById("days").textContent = "0";
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";
        document.getElementById("done").style.display = "block";
        return;
      }

      const total = Math.floor(diff / 1000);
      const days = Math.floor(total / 86400);
      const hours = Math.floor((total % 86400) / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const seconds = total % 60;

      document.getElementById("days").textContent = String(days);
      document.getElementById("hours").textContent = String(hours).padStart(2, "0");
      document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
      document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    setInterval(() => {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.style.left = Math.random() * 100 + "vw";
      heart.textContent = "❤️";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 6000);
    }, 500);
  </script>
</body>
</html>
